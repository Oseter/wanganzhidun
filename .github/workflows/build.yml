name: Build WangAnZhiDun.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: The-Preservation/Cyber-Shield/Windows
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe with PyInstaller
        working-directory: The-Preservation/Cyber-Shield/Windows
        run: pyinstaller build.spec

      - name: Sign exe (Authenticode)
        if: false  # 需配置 WIN_CERT_PFX / WIN_CERT_PWD secrets 后改为 true
        working-directory: The-Preservation/Cyber-Shield/Windows
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.WIN_CERT_PFX }}
          PFX_PWD: ${{ secrets.WIN_CERT_PWD }}
        run: .\sign_windows.ps1

      - name: Package portable (onedir zip)
        working-directory: The-Preservation/Cyber-Shield/Windows
        shell: pwsh
        run: Compress-Archive -Path dist\WangAnZhiDun -DestinationPath WangAnZhiDun-portable.zip -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer (WangAnZhiDun-Setup.exe)
        continue-on-error: true
        working-directory: The-Preservation/Cyber-Shield/Windows
        shell: pwsh
        run: |
          Write-Host "Checking files..."
          Get-ChildItem installer\ | ForEach-Object { Write-Host "  $($_.Name)" }
          Get-ChildItem resources\ | ForEach-Object { Write-Host "  $($_.Name)" }
          Write-Host "dist\WangAnZhiDun exists: $(Test-Path dist\WangAnZhiDun)"
          Write-Host "config.ini exists: $(Test-Path config.ini)"
          $iscc = Get-ChildItem "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" -ErrorAction SilentlyContinue
          if (-not $iscc) { $iscc = Get-Command iscc -ErrorAction SilentlyContinue }
          if (-not $iscc) { throw "ISCC.exe not found" }
          Write-Host "ISCC: $($iscc.FullName)"
          & $iscc.FullName installer.iss 2>&1 | ForEach-Object { Write-Host $_ }
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with exit code $LASTEXITCODE" }
          Write-Host "Installer built OK"
          Get-ChildItem installer\WangAnZhiDun-Setup.exe | ForEach-Object { Write-Host "  $($_.Name) $($_.Length) bytes" }

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: WangAnZhiDun-portable
          path: The-Preservation/Cyber-Shield/Windows/WangAnZhiDun-portable.zip

      - name: Upload installer artifact
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: WangAnZhiDun-Setup.exe
          path: The-Preservation/Cyber-Shield/Windows/installer/WangAnZhiDun-Setup.exe

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: WangAnZhiDun 自动构建 #${{ github.run_number }}
          body: |
            网安智盾 WangAnZhiDun 自动构建（Windows 64位）。
            - WangAnZhiDun-Setup.exe：安装包（推荐，含开始菜单/桌面快捷方式/卸载）
            - WangAnZhiDun-portable.zip：免安装目录版（解压即用，运行时不再 temp 解包）
            常驻系统托盘，监听 QQ/微信 通知栏，关键词触发截图+自带录屏+证据归档。
            已关闭 UPX、嵌入 asInvoker 清单与版本信息以降低误报；如仍有 SmartScreen
            拦截，请见仓库 AV_误报处置 说明（需代码签名证书，CI 已接好签名步骤）。
          files: |
            The-Preservation/Cyber-Shield/Windows/WangAnZhiDun-portable.zip
            The-Preservation/Cyber-Shield/Windows/installer/WangAnZhiDun-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
