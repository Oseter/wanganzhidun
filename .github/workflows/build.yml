name: Build WangAnZhiDun.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: The-Preservation/Cyber-Shield/Windows
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe with PyInstaller
        working-directory: The-Preservation/Cyber-Shield/Windows
        run: pyinstaller build.spec

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: WangAnZhiDun.exe
          path: The-Preservation/Cyber-Shield/Windows/dist/WangAnZhiDun.exe

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: WangAnZhiDun 自动构建 #${{ github.run_number }}
          body: |
            自动构建的 WangAnZhiDun.exe（Windows 64位）。
            常驻系统托盘，监听 QQ/微信 通知栏，关键词触发截图+自带录屏+证据归档。
          files: The-Preservation/Cyber-Shield/Windows/dist/WangAnZhiDun.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
