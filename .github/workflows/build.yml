name: Build & Release (EXE + APK)

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  # 从 tag 提取版本号，如 v1.4.0-beta → 1.4.0-beta；非 tag 推送用 run_number
  APP_VER: ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}

jobs:
  # ========== 任务 1：构建 Windows EXE ==========
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: The-Preservation/Cyber-Shield/Windows
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        working-directory: The-Preservation/Cyber-Shield/Windows
        run: pyinstaller build.spec

      - name: Sign exe (Authenticode)
        if: false
        working-directory: The-Preservation/Cyber-Shield/Windows
        shell: pwsh
        env:
          PFX_B64: ${{ secrets.WIN_CERT_PFX }}
          PFX_PWD: ${{ secrets.WIN_CERT_PWD }}
        run: .\sign_windows.ps1

      - name: Package portable
        working-directory: The-Preservation/Cyber-Shield/Windows
        shell: pwsh
        run: Compress-Archive -Path dist\WangAnZhiDun -DestinationPath WangAnZhiDun-portable.zip -Force

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build installer
        working-directory: The-Preservation/Cyber-Shield/Windows
        shell: pwsh
        run: |
          $iscc = Get-ChildItem "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" -ErrorAction SilentlyContinue
          if (-not $iscc) { $iscc = Get-Command iscc -ErrorAction SilentlyContinue }
          if (-not $iscc) { throw "ISCC.exe not found" }
          & $iscc.FullName installer.iss 2>&1
          if (-not (Test-Path installer\WangAnZhiDun-Setup.exe)) { throw "installer not found" }

      - name: Rename Windows artifacts with version
        shell: pwsh
        run: |
          $ver = "${{ env.APP_VER }}"
          New-Item -ItemType Directory -Path windows-release -Force
          Copy-Item The-Preservation/Cyber-Shield/Windows/WangAnZhiDun-portable.zip "windows-release/WangAnZhiDun-$ver-portable.zip"
          Copy-Item The-Preservation/Cyber-Shield/Windows/installer/WangAnZhiDun-Setup.exe "windows-release/WangAnZhiDun-$ver-Setup.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: windows-release/

  # ========== 任务 2：构建 Android APK ==========
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build APK (debug)
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: '8.9'
          build-root-directory: The-Preservation/Cyber-Shield/Android
          arguments: ':app:assembleDebug'

      - name: Rename APK with version
        working-directory: The-Preservation/Cyber-Shield/Android
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk "WangAnZhiDun-${{ env.APP_VER }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: The-Preservation/Cyber-Shield/Android/WangAnZhiDun-${{ env.APP_VER }}.apk

  # ========== 任务 3：合并发布 ==========
  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-artifacts/

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-artifacts/

      - name: List artifacts
        run: ls -laR release-artifacts/

      - name: Generate tag name
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "tag=build-${{ github.run_number }}" >> $GITHUB_OUTPUT
          fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 网安智盾 v${{ steps.tag.outputs.tag }}
          body: |
            网安智盾 WangAnZhiDun 自动构建。

            ## Windows
            - **WangAnZhiDun-${{ env.APP_VER }}-Setup.exe**：安装包（推荐，含开始菜单/桌面快捷方式/卸载）
            - **WangAnZhiDun-${{ env.APP_VER }}-portable.zip**：免安装目录版（解压即用）

            ## Android
            - **WangAnZhiDun-${{ env.APP_VER }}.apk**：需 Android 7.0+，需开启通知监听+无障碍服务权限

            ## 红线
            仅记录针对本人的恶意攻击，证据真实，经官方合规渠道举报；
            不伪造证据、不自动举报、不向非恶意目标使用。
          files: |
            release-artifacts/WangAnZhiDun-${{ env.APP_VER }}-portable.zip
            release-artifacts/WangAnZhiDun-${{ env.APP_VER }}-Setup.exe
            release-artifacts/WangAnZhiDun-${{ env.APP_VER }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
