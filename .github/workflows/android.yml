name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'The-Preservation/Cyber-Shield/Android/**'
      - '.github/workflows/android.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        working-directory: The-Preservation/Cyber-Shield/Android
        run: gradle :app:assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WangAnZhiDun-apk
          path: The-Preservation/Cyber-Shield/Android/app/build/outputs/apk/release/*.apk

      - name: Publish Release with APK
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: apk-build-${{ github.run_number }}
          name: WangAnZhiDun APK 自动构建 #${{ github.run_number }}
          body: |
            网安智盾 Android APK 自动构建。
            - WangAnZhiDun.apk：需 Android 10+，需开启通知监听 + 无障碍服务权限。
          files: |
            The-Preservation/Cyber-Shield/Android/app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
