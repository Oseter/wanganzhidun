; ============================================================
; 网安智盾 Windows 版 — 配置文件
; 存护命途 · 防打号 / 防点号 / 反伤
; 普通用户只需改这里，零代码即可调整行为
; ============================================================

[monitor]
; 触发关键词，逗号分隔。通知文本命中任一关键词即触发取证
keywords = 举报,违规,封号,冻结,炸群,恶意,攻击,投诉,恶意举报,举报你
; 命中后是否自动截图
enable_screenshot = true
; 命中后是否抓取自带循环缓冲录像
enable_recording = true
; 取证静默延迟（秒）：命中后等待几秒再截，给恶意内容完整显示
capture_delay = 1
; 单次取证后冷却（秒）：避免同一事件重复触发
cooldown = 30

[evidence]
; 证据保存根目录（留空则用程序目录下 evidence\）
save_path =
; 截图格式：png / jpg
screenshot_format = png
; 单事件最多截图张数
max_screenshots = 3
; 是否对证据文件做本地 AES 加密
encrypt = true

[recorder]
; 自带循环缓冲录屏（无需安装 OBS 等任何第三方应用）
; 后台线程抓帧存入内存环形缓冲，命中关键词时落盘最近 N 秒
enabled = true
; 帧率（建议 8~15，平衡性能与证据清晰度）
fps = 10
; 缓冲时长（秒）：可回溯取证的时间窗口
buffer_seconds = 30
; 分辨率缩放（0.5~1.0）：降低显存/内存占用
scale = 0.75
; 显示器编号：1=主显示器，2=副显示器……
monitor_index = 1

[email]
; 举报邮件通道（同谐命途航母组件）：用 jubao@12377.cn 等官方邮箱
; 留空则仅生成本地举报草稿，不发邮件
smtp_server =
smtp_port = 587
sender =
sender_password =
receiver = jubao@12377.cn

[anti_strike]
; 反伤（对方攻击你，你反向举报对方）
; 注意：必须用户手动确认才发起，程序不自动举报
enabled = false
; 确认弹窗自动关闭超时（秒），0 表示不自动关闭
confirm_timeout = 30
; 反伤目标需满足：对方通知中明确出现攻击性关键词
require_attack_keyword = true

[report]
; 反伤通道（同谐命途·多入口并发举报）。全部仅在用户手动确认后触发。
; 12377 网信办官网 / 腾讯卫士 / 举报邮箱，可单独开关
enable_12377 = true
enable_guard = true
enable_email = true
url_12377 = https://www.12377.cn/
url_guard = https://110.qq.com/
; 是否把举报草稿复制到剪贴板，便于在各通道粘贴提交
copy_ammo = true

[standard_ammo]
; 标准弹药格式：目标账号 / 时间 / 违规内容 / 对应条款 / 证据附件
; 默认对应条款（用户可在确认弹窗中修改）
default_clause = 《网络安全法》第十二条 / 平台用户协议-骚扰恶意举报
